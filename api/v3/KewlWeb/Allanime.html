<!DOCTYPE html>
<html>
<head>
    <title>seph's gaming room - AllAnime</title>

    <link rel="icon" type="image/png" href="../../../image/favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Inconsolata:wght@400;700&display=swap" rel="stylesheet">

    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
        }

        #bg-img {
            position: fixed;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
        }

        #container {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 2;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: none;
            position: absolute;
            z-index: 2;
        }

        .play-button {
            padding: 20px 40px;
            background: transparent;
            border: none;

            font-family: 'Inconsolata', monospace;
            font-size: 32px;
            font-weight: 900;

            cursor: pointer;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;

            background: linear-gradient(90deg, #000, #fff, #000);
            background-size: 200% 200%;
            background-clip: text;

            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;

            animation: textFlow 3s linear infinite;
        }

        @keyframes textFlow {
            0% { background-position: 0% 50%; }
            100% { background-position: 200% 50%; }
        }
    </style>
</head>

<body>

    <img id="bg-img" src="../../../Images/bg.jpg" alt="background">

    <div id="container">
        <iframe id="fr" allowfullscreen></iframe>

        <button class="play-button" onclick="launchGame()">
            Boot Game ツ
        </button>
    </div>

<script>
const url = "https://allanime.ink/";

function launchGame() {
    const iframe = document.getElementById("fr");

    iframe.src = url;
    iframe.style.display = "block";

    document.querySelector(".play-button").style.display = "none";
}
</script>

</body>
</html>
