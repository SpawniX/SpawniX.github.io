<!DOCTYPE html>
<html>
<head>
    <title>seph's gaming room - Geometry Dash</title>

    <link rel="icon" type="image/png" href="../../../image/favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Inconsolata:wght@400;700&display=swap" rel="stylesheet">

    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background: black;
        }

        #bg-img {
            position: fixed;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
        }

        #container {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 2;
        }

        /* iframe gets injected by JS */
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            position: absolute;
            z-index: 2;
        }

        .play-button {
            padding: 20px 40px;
            background: transparent;
            border: none;

            font-family: 'Inconsolata', monospace;
            font-size: 32px;
            font-weight: 900;

            cursor: pointer;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;

            background: linear-gradient(90deg, #000, #fff, #000);
            background-size: 200% 200%;
            background-clip: text;

            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;

            animation: textFlow 3s linear infinite;
        }

        @keyframes textFlow {
            0% { background-position: 0% 50%; }
            100% { background-position: 200% 50%; }
        }
    </style>
</head>

<body>

    <img id="bg-img" src="../../../Images/bg.jpg" alt="background">

    <div id="container">
        <button class="play-button" onclick="launchGame()">
            Boot Geometry Dash ツ
        </button>
    </div>

<script>
let url_game = "https://geodashgame.io/game/geometry-dash-lite/";

function launchGame() {
    const iframe = document.createElement("iframe");

    iframe.src = url_game;
    iframe.id = "gd_frame";

    iframe.setAttribute("frameborder", "0");
    iframe.setAttribute("allowfullscreen", "true");

    iframe.setAttribute(
        "sandbox",
        "allow-forms allow-modals allow-same-origin allow-scripts allow-pointer-lock allow-orientation-lock allow-presentation"
    );

    document.body.appendChild(iframe);

    document.querySelector(".play-button").style.display = "none";
}
</script>

</body>
</html>
