<!DOCTYPE html>
<html>
<head>
    <title>seph's gaming room - Minecraft 1.12.2</title>

    <link rel="icon" type="image/png" href="../../../image/favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Inconsolata:wght@400;700&display=swap" rel="stylesheet">

    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
        }

        #bg-img {
            position: fixed;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
        }

        #container {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 2;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: none;
            position: absolute;
            z-index: 2;
        }

        .play-button {
            padding: 20px 40px;
            background: transparent;
            border: none;

            font-family: 'Inconsolata', monospace;
            font-size: 32px;
            font-weight: 900;

            cursor: pointer;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;

            background: linear-gradient(90deg, #000, #fff, #000);
            background-size: 200% 200%;
            background-clip: text;

            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;

            animation: textFlow 3s linear infinite;
        }

        @keyframes textFlow {
            0% {
                background-position: 0% 50%;
            }
            100% {
                background-position: 200% 50%;
            }
        }

        .fullscreen-button {
            padding: 10px 15px;
            background: #000;
            color: #fff;
            border: 2px solid #4a148c;
            border-radius: 5px;
            font: bold 14px Arial;
            cursor: pointer;
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 10;
        }

        .fullscreen-button:hover {
            background: #4a148c;
        }
    </style>
</head>

<body>

    <img id="bg-img" src="../../../Images/bg.jpg" alt="background">

    <div id="container">
        <iframe id="fr" allowfullscreen></iframe>

        <button class="play-button" onclick="PlayTo(this)">Boot Game ツ </button>
    </div>

<script>
const Cache = 'SexyCache';
const Wowie = 'SexyBalls';
const SexyBalls = 90 * 24 * 60 * 60 * 1000;

const billy = 'https://cdn.jsdelivr.net/gh/PlanetDogeCodes/Eagletcraft-1.12@main/source%20file/egc1-12.xml';

function openDB() {
    return new Promise((resolve, reject) => {
        const request = indexedDB.open(Cache, 1);

        request.onupgradeneeded = (e) => {
            const db = e.target.result;
            db.createObjectStore(Wowie, { keyPath: 'url' });
        };

        request.onsuccess = (e) => resolve(e.target.result);
        request.onerror = (e) => reject(e.target.error);
    });
}

async function saveToCache(url, content) {
    const db = await openDB();
    return new Promise((resolve, reject) => {
        const tx = db.transaction(Wowie, 'readwrite');
        const store = tx.objectStore(Wowie);
        const req = store.put({ url, content, timestamp: Date.now() });

        req.onsuccess = () => resolve();
        req.onerror = () => reject();
    });
}

async function getFileFromCache(url) {
    const db = await openDB();

    return new Promise((resolve, reject) => {
        const tx = db.transaction(Wowie, 'readonly');
        const store = tx.objectStore(Wowie);
        const req = store.get(url);

        req.onsuccess = async (e) => {
            const data = e.target.result;

            if (data && (Date.now() - data.timestamp) < SexyBalls) {
                resolve(data.content);
            } else {
                try {
                    const res = await fetch(url);
                    const text = await res.text();
                    await saveToCache(url, text);
                    resolve(text);
                } catch (err) {
                    reject(err);
                }
            }
        };

        req.onerror = () => reject();
    });
}

function PlayTo(button) {
    const iframe = document.getElementById("fr");

    getFileFromCache(billy).then((text) => {
        iframe.contentDocument.open();
        iframe.contentDocument.write(text);
        iframe.contentDocument.close();

        iframe.style.display = "block";
        button.style.display = "none";

    }).catch((err) => {
        console.error(err);
        alert("Error loading game.");
    });
}

function openFullscreen() {
    getFileFromCache(billy).then((text) => {
        const win = window.open("", "_blank");

        if (!win) return alert("Popup blocked");

        win.document.open();
        win.document.write(text);
        win.document.close();
    });
}
</script>

</body>
</html>
